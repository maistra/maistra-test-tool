apiVersion: federation.maistra.io/v1
kind: ServiceMeshPeer
metadata:
  name: east-mesh
spec:
  remote:
    addresses:
    - {{ .Address }}
    discoveryPort: 8188
    servicePort: 15443
  gateways:
    ingress:
      name: {{ .LocalIngressName }}
    egress:
      name: {{ .LocalEgressName }}
  security:
    trustDomain: {{ .PeerTrustDomain }}
    clientID: {{ .PeerEgressSA }}
    certificateChain:
      kind: ConfigMap
      name: east-mesh-ca-root-cert
